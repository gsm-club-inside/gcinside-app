name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gcinside_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gcinside_test
      SESSION_SECRET: ci-lighthouse-secret-must-be-32-chars!
      OAUTH_CLIENT_ID: dummy-client-id
      OAUTH_REDIRECT_URI: http://localhost:3000/api/auth/callback
      ADMIN_EMAILS: admin@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup database schema
        run: npx prisma db push --skip-generate

      - name: Build
        run: npm run build

      - name: Start server
        run: npm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@12
        with:
          configPath: lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment Lighthouse results
        if: always() && steps.lighthouse.outputs.links
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const links = JSON.parse('${{ steps.lighthouse.outputs.links }}');
            const manifest = JSON.parse('${{ steps.lighthouse.outputs.manifest }}');

            const formatScore = (score) => {
              const pct = Math.round(score * 100);
              const emoji = pct >= 90 ? '🟢' : pct >= 70 ? '🟡' : '🔴';
              return `${emoji} ${pct}`;
            };

            const rows = manifest.map((run) => {
              const s = run.summary;
              const url = links[run.url] ?? run.url;
              return `| [${run.url}](${url}) | ${formatScore(s.performance)} | ${formatScore(s.accessibility)} | ${formatScore(s['best-practices'])} | ${formatScore(s.seo)} |`;
            });

            const body = [
              '## ⚡ Lighthouse Report',
              '',
              '| URL | Performance | Accessibility | Best Practices | SEO |',
              '|-----|-------------|---------------|----------------|-----|',
              ...rows,
              '',
              '🟢 ≥ 90 · 🟡 ≥ 70 · 🔴 < 70',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' && c.body?.startsWith('## ⚡ Lighthouse Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
