name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy. Defaults to the current workflow ref."
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: ssh deploy
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true' }}
    environment: production

    steps:
      - name: Resolve deploy ref
        id: deploy-ref
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -eu

          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_USER:?DEPLOY_USER secret is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY secret is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host gcinside-production
            HostName $DEPLOY_HOST
            Port ${DEPLOY_PORT:-22}
            User $DEPLOY_USER
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy over SSH
        env:
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_REF: ${{ steps.deploy-ref.outputs.ref }}
        run: |
          set -eu

          ssh gcinside-production \
            "DEPLOY_ROOT='${DEPLOY_ROOT:-}' DEPLOY_REF='$DEPLOY_REF' bash -s" <<'REMOTE'
          set -euo pipefail

          ROOT="${DEPLOY_ROOT:-$HOME/GC}"
          APP_DIR="$ROOT/gcinside-app"
          INFRA_DIR="$ROOT/gcinside-infra"
          IMAGE_TAG="$(printf '%s' "$DEPLOY_REF" | cut -c1-12)"

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard "$DEPLOY_REF"

          cd "$INFRA_DIR"
          git fetch origin master
          git checkout master
          git pull --ff-only origin master

          sh scripts/preflight.sh

          GCINSIDE_IMAGE_TAG="$IMAGE_TAG" docker compose build app
          GCINSIDE_IMAGE_TAG="$IMAGE_TAG" docker compose up -d app
          docker compose ps app caddy
          REMOTE
