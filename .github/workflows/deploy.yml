name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy. Defaults to the current workflow ref."
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: ssh deploy
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true' }}
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve deployment revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          set -eu

          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.next-e2e' \
            --exclude='coverage' \
            --exclude='test-results' \
            -czf /tmp/gcinside-app.tar.gz .

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -eu

          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_USER:?DEPLOY_USER secret is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY secret is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host gcinside-production
            HostName $DEPLOY_HOST
            Port ${DEPLOY_PORT:-22}
            User $DEPLOY_USER
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy over SSH
        env:
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
        run: |
          set -eu

          DEPLOY_REF="${{ steps.revision.outputs.sha }}"

          scp /tmp/gcinside-app.tar.gz gcinside-production:/tmp/gcinside-app-${DEPLOY_REF}.tar.gz

          ssh gcinside-production \
            "DEPLOY_ROOT='${DEPLOY_ROOT:-}' DEPLOY_REF='$DEPLOY_REF' bash -s" <<'REMOTE'
          set -euo pipefail

          ROOT="${DEPLOY_ROOT:-$HOME/GC}"
          APP_DIR="$ROOT/gcinside-app"
          INFRA_DIR="$ROOT/gcinside-infra"
          IMAGE_TAG="$(printf '%s' "$DEPLOY_REF" | cut -c1-12)"
          ARCHIVE="/tmp/gcinside-app-${DEPLOY_REF}.tar.gz"

          mkdir -p "$APP_DIR"
          find "$APP_DIR" -mindepth 1 -maxdepth 1 \
            ! -name '.env' \
            ! -name '.next' \
            ! -name 'node_modules' \
            -exec rm -rf {} +
          tar -xzf "$ARCHIVE" -C "$APP_DIR"
          rm -f "$ARCHIVE"

          cd "$INFRA_DIR"

          sh scripts/preflight.sh

          GCINSIDE_IMAGE_TAG="$IMAGE_TAG" sudo docker compose build app
          GCINSIDE_IMAGE_TAG="$IMAGE_TAG" sudo docker compose up -d --no-deps app
          sudo docker compose ps app caddy
          REMOTE
